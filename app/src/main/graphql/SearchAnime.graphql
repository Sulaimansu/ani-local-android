query SearchAnime($search: String, $page: Int, $type: MediaType) {
  page: Page(page: $page, perPage: 20) {
    media(type: $type, search: $search, sort: POPULARITY_DESC) {
      id
      title {
        romaji
        english
        native
      }
      description
      status
      format
      episodes
      duration
      season
      seasonYear
      coverImage {
        extraLarge
        large
        color
      }
      bannerImage
      genres
      tags {
        name
        description
      }
      startDate {
        year
        month
        day
      }
      nextAiringEpisode {
        episode
        airingAt
        timeUntilAiring
      }
      relations {
        edges {
          relationType
          node {
            id
            title {
              romaji
              english
            }
            coverImage {
              large
              extraLarge
            }
            status
          }
        }
      }
      studios(isMain: true) {
        nodes {
          name
        }
      }
      averageScore
      popularity
      siteUrl
      synonyms
    }
  }
}
