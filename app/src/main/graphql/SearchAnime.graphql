query SearchAnime($search: String, $page: Int, $type: MediaType) {
  Page(page: $page, perPage: 20) {
    media(type: $type, search: $search) {
      id
      title {
        romaji
        english
        native
      }
      description
      status
      episodes
      coverImage {
        extraLarge
        color
      }
      bannerImage
      genres
      tags {
        name
        description
      }
      startDate {
        year
        month
        day
      }
      nextAiringEpisode {
        episode
        airingAt
        timeUntilAiring
      }
      relations {
        edges {
          relationType
          node {
            id
            title {
              romaji
            }
            coverImage {
              large
            }
          }
        }
      }
    }
  }
}