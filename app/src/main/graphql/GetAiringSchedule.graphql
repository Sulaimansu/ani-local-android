query GetAiringSchedule($airingAt_greater: Int, $airingAt_lesser: Int) {
  AiringSchedule(airingAt_greater: $airingAt_greater, airingAt_lesser: $airingAt_lesser, sort: [TIME], perPage: 50, notYetAired: true) {
    nodes {
      id
      episode
      airingAt
      timeUntilAiring
      media {
        id
        title {
          romaji
          english
          native
        }
        status
        format
        episodes
        coverImage {
          extraLarge
          large
          color
        }
        genres
        nextAiringEpisode {
          episode
          airingAt
        }
        studios(isMain: true) {
          nodes {
            name
          }
        }
        averageScore
        popularity
      }
    }
  }
}
