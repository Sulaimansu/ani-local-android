query GetAiringSchedule($airingAt_greater: Int, $airingAt_lesser: Int) {
  page: Page(page: 1, perPage: 50) {
    airingSchedules(airingAt_greater: $airingAt_greater, airingAt_lesser: $airingAt_lesser, perPage: 50) {
      id
      episode
      airingAt
      timeUntilAiring
      media {
        id
        title {
          romaji
          english
          native
        }
        status
        format
        episodes
        duration
        season
        seasonYear
        coverImage {
          extraLarge
          large
          color
        }
        bannerImage
        genres
        nextAiringEpisode {
          episode
          airingAt
          timeUntilAiring
        }
        studios(isMain: true) {
          nodes {
            name
          }
        }
        averageScore
        popularity
      }
    }
  }
}
